  <!-- fade so the grid doesn't fight the text -->
  <rect x="560" y="0" width="640" height="280" fill="#16213e" opacity="0.35"/>

  <rect x="60" y="52" width="8" height="130" rx="4" fill="url(#accent)"/>

  <text x="92" y="112" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">RPG Maker MZ MCP Server</text>
  <text x="92" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#a8b2d1">Author actors, maps, events, and tiles from natural language</text>
  <text x="92" y="177" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#a8b2d1">— via the Model Context Protocol.</text>

  <!-- badge-style chips -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600">
    <rect x="92" y="205" width="98" height="30" rx="15" fill="#e94560" opacity="0.9"/>
    <text x="141" y="225" fill="#ffffff" text-anchor="middle">123 tools</text>

    <rect x="200" y="205" width="112" height="30" rx="15" fill="#0f3460" stroke="#3fa796" stroke-width="1.5"/>
    <text x="256" y="225" fill="#e8f1f2" text-anchor="middle">stdio MCP</text>

    <rect x="322" y="205" width="128" height="30" rx="15" fill="#0f3460" stroke="#e9c46a" stroke-width="1.5"/>
    <text x="386" y="225" fill="#e8f1f2" text-anchor="middle">TypeScript</text>
  </g>
</svg>
